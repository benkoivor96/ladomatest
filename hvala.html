<!DOCTYPE html>
<html lang="hr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hvala — La DoMa Art</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f4f0; --cream: #1a1714; --cream-dim: #4a453d; --cream-muted: #8a857b;
    --gold: #9a7b52; --gold-light: #b8976a; --border-gold: rgba(154,123,82,0.25);
    --heading: 'Cormorant Garamond', Georgia, serif; --body: 'DM Sans', sans-serif;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: var(--body); background: var(--bg); color: var(--cream);
    display: flex; align-items: center; justify-content: center; min-height: 100vh;
  }
  .container { text-align: center; padding: 2rem; max-width: 500px; }
  .brand {
    font-family: var(--heading); font-size: 1.4rem; font-weight: 300;
    letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 3rem;
    animation: fadeIn 0.6s ease both;
  }
  .brand strong { font-weight: 600; color: var(--gold); }
  .check {
    width: 80px; height: 80px; border-radius: 50%; border: 1.5px solid var(--gold);
    background: rgba(154,123,82,0.08); display: flex; align-items: center;
    justify-content: center; margin: 0 auto 2rem; animation: fadeIn 0.6s ease 0.1s both;
  }
  .check svg { width: 36px; height: 36px; stroke: var(--gold); fill: none; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
  .check svg path { stroke-dasharray: 40; stroke-dashoffset: 40; animation: draw 0.5s ease 0.5s forwards; }
  @keyframes draw { to { stroke-dashoffset: 0; } }
  h1 {
    font-family: var(--heading); font-size: 2.4rem; font-weight: 300; line-height: 1.15;
    margin-bottom: 1rem; animation: fadeIn 0.6s ease 0.15s both;
  }
  h1 em { font-style: italic; font-weight: 400; color: var(--gold); }
  .desc { font-size: 1rem; color: var(--cream-dim); line-height: 1.7; margin-bottom: 2.5rem; animation: fadeIn 0.6s ease 0.2s both; }
  .btn {
    display: inline-flex; align-items: center; gap: 0.6rem; padding: 0.9rem 2rem;
    background: var(--gold); color: #fff; text-decoration: none;
    font-size: 0.82rem; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
    transition: all 0.4s; animation: fadeIn 0.6s ease 0.3s both;
  }
  .btn:hover { background: var(--gold-light); letter-spacing: 0.14em; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="container">
  <div class="brand">La <strong>DoMa</strong> Art</div>
  <div class="check"><svg viewBox="0 0 24 24"><path d="M5 13l4 4L19 7"/></svg></div>
  <h1>Hvala na <em>upitu!</em></h1>
  <p class="desc">Vaša poruka je uspješno poslana. Javit ćemo vam se u najkraćem roku s prijedlogom termina za konzultaciju.</p>
  <a href="/" class="btn">← Natrag na naslovnicu</a>
</div>
</body>
</html>
